# Render Blueprint: https://render.com/docs/blueprint-spec
# Native Node (no Docker) — avoids "Dockerfile: no such file" on some Render builds.
# Set in dashboard: CLIENT_URL, SERVER_URL, SESSION_SECRET, Google OAuth,
# and Build-time VITE_* (VITE_API_URL = your service HTTPS URL, same as SERVER_URL).
services:
  - type: web
    name: trueprice-api
    runtime: node
    buildCommand: npm install && npm run build && cd server && npm install
    # If the run instance has no dist/ (some hosts omit ignored build output), rebuild before start.
    startCommand: bash -c 'if [ ! -f dist/index.html ]; then npm run build; fi && cd server && npm start'
    plan: free
