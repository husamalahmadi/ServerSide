# Render Blueprint: https://render.com/docs/blueprint-spec
# Native Node (no Docker) — avoids "Dockerfile: no such file" on some Render builds.
# Set in dashboard: CLIENT_URL, SERVER_URL, SESSION_SECRET, Google OAuth,
# and Build-time VITE_* (VITE_API_URL = your service HTTPS URL, same as SERVER_URL).
services:
  - type: web
    name: trueprice-api
    runtime: node
    # --include=dev: Vite lives in devDependencies; Render sets NODE_ENV=production and skips devDeps by default.
    buildCommand: npm install --include=dev && npm run build && cd server && npm install
    # Same as package.json "render:start" — build client into server/static then run API.
    startCommand: npm run render:start
    plan: free
    envVars:
      - key: DB_PATH
        value: /var/data/trueprice.db
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
